<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
    integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous" />
  <title>Bootstrap Form Validation</title>
</head>

<body>
  <div class="container w-50">
    <h1 class="mt-5">Form Validation Display</h1>

    <form novalidate class="needs-validation">
      <div class="mb-3">
        <label for="username" class="form-label">Username</label>
        <input type="text" class="form-control" id="username" required />
        <div class="valid-feedback">Looks Good</div>
        <div class="invalid-feedback">Please input your username</div>
      </div>
      <div class="mb-3">
        <label for="email" class="form-label">Email address</label>
        <input type="email" class="form-control" id="email" required />
        <div class="valid-feedback">Looks Good</div>
        <div class="invalid-feedback">Please input your email</div>
      </div>
      <div class="mb-3">
        <label for="city" class="form-label">City</label>
        <input type="text" class="form-control" id="city" required />
        <div class="valid-feedback">Looks Good</div>
        <div class="invalid-feedback">Please pick a city</div>
      </div>

      <div class="mb-3">
        <div class="form-check">
          <input class="form-check-input" type="checkbox" value="" id="invalidCheck" required />
          <label class="form-check-label" for="invalidCheck">
            Agree to terms and conditions
          </label>
          <div class="valid-feedback">Looks Good</div>
          <div class="invalid-feedback">Please check the box to continue</div>
        </div>
      </div>

      <input type="submit" class="btn btn-primary" value="Submit" />
    </form>
    <br>
  </div>
  <div class="my-5"></div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
    integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
    crossorigin="anonymous"></script>
  <script>
    const form = document.querySelector('.needs-validation');

    form.addEventListener('submit', (e) => {
      if (!form.checkValidity()) {
        e.preventDefault();
      } else {
        alert('Form submitted successfully!');
      }
      form.classList.add('was-validated');
    })
  </script>
</body>

</html>
