<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
    <title>Alpha Rating Component</title>
  </head>

  <body>
    <div class="container-md">
      <h1 class="my-3 text-center">Alpha Rating Component</h1>
      <div
        class="card bg-light border-0 shadow-lg rounded-4 my-3 col-lg-9 mx-auto"
      >
        <div class="card-body">
          <!-- Top row -->
          <div class="row p-3">
            <div class="col-sm-7">
              <h2 class="fw-bold text-center text-sm-start mb-3">Rating</h2>
            </div>
            <div class="col-sm-5">
              <div class="card">
                <div class="card-body">
                  <h3 class="display-5 fw-semibold text-center">
                    <i class="fas fa-star text-warning"></i> 4.8
                  </h3>
                  <p class="text-center">Based on 1,234 reviews</p>
                </div>
              </div>
            </div>
          </div>
          <!-- Search -->
          <div class="row px-5">
            <div class="col-12">
              <div class="input-group input-group-lg">
                <span class="input-group-text rounded-start-5">
                  <i class="fas fa-search"></i>
                </span>
                <input
                  type="text"
                  class="form-control rounded-end-5"
                  placeholder="Search Reviews"
                />
              </div>
            </div>
          </div>
          <!-- Rating -->
          <div class="row p-5">
            <div class="col-12 vstack gap-2">
              <h5>Rating</h5>
              <div class="d-flex align-items-center gap-2">
                <span>5</span><i class="fas fa-star text-warning"></i>
                <div class="progress ms-3" style="width: 100%">
                  <div
                    class="progress-bar progress-bar-animated progress-bar-striped bg-warning"
                    style="width: 90%"
                    role="progressbar"
                  ></div>
                </div>
              </div>
              <div class="d-flex align-items-center gap-2">
                <span>4</span><i class="fas fa-star text-warning"></i>
                <div class="progress ms-3" style="width: 100%">
                  <div
                    class="progress-bar progress-bar-animated progress-bar-striped bg-warning"
                    style="width: 95%"
                    role="progressbar"
                  ></div>
                </div>
              </div>
              <div class="d-flex align-items-center gap-2">
                <span>3</span><i class="fas fa-star text-warning"></i>
                <div class="progress ms-3" style="width: 100%">
                  <div
                    class="progress-bar progress-bar-animated progress-bar-striped bg-warning"
                    style="width: 50%"
                    role="progressbar"
                  ></div>
                </div>
              </div>
              <div class="d-flex align-items-center gap-2">
                <span>2</span><i class="fas fa-star text-warning"></i>
                <div class="progress ms-3" style="width: 100%">
                  <div
                    class="progress-bar progress-bar-animated progress-bar-striped bg-warning"
                    style="width: 40%"
                    role="progressbar"
                  ></div>
                </div>
              </div>
              <div class="d-flex align-items-center gap-2">
                <span>1</span><i class="fas fa-star text-warning"></i>
                <div class="progress ms-3" style="width: 100%">
                  <div
                    class="progress-bar progress-bar-animated progress-bar-striped bg-warning"
                    style="width: 10%"
                    role="progressbar"
                  ></div>
                </div>
              </div>
            </div>
          </div>
          <!-- Button -->
          <div class="row px-5 pb-4">
            <div class="col-12">
              <a href="#" class="btn btn-success btn-lg rounded-3"
                >Write Reviews</a
              >
            </div>
          </div>
        </div>
      </div>
    </div>

    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>
  </body>
</html>
